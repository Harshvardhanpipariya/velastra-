                        className: "rl-button",
                      }),
                      interactive: true,
                    })
                      .addTo(map)
                      .bindPopup(
                        `<b>${getDisplayName(s.id)} - RL: ${rlVal} m (Z:${s.altitude?.toFixed(1)} + C:${FIXED_SEA_LEVEL_HEIGHT})</b>`,
                      );
                    vehicleMarkers[haulerId].push(rlMarker);
                  }
                } else {
                  const rlVal = s.rl;
                  if (rlVal !== null) {
                    const rlMarker = L.marker([s.pos[0] - 0.0001, s.pos[1]], {
                      icon: L.divIcon({
                        html: `<div style="${rlButtonStyle}">RL: ${rlVal}m</div>`,
                        iconSize: [48, 20],
                        className: "rl-button",
                      }),
                      interactive: true,
                    })
                      .addTo(map)
                      .bindPopup(
                        `<b>${getDisplayName(s.id)} - RL: ${rlVal} m (Z:${s.altitude?.toFixed(1)} + C:${FIXED_SEA_LEVEL_HEIGHT})</b>`,
                      );

                    if (!vehicleMarkers[haulerId])
                      vehicleMarkers[haulerId] = [];
                    vehicleMarkers[haulerId].push(rlMarker);
                  }

                  const haulerColor =
                    s.id === "D3"
                      ? "#2196F3"
                      : s.id === "D8"
                        ? "#4CAF50"
                        : s.id === "D9"
                          ? "#9C27B0"
                          : "#2196F3";
                  const haulerMarker = L.marker(s.pos, {
                    icon: L.divIcon({
                      html: `<div style="background:${haulerColor};padding:4px;border-radius:4px;font-weight:700;color:#000;font-size:10px;border:2px solid #fff;">${getDisplayName(s.id)}</div>`,
                      iconSize: [40, 25],
                    }),
                    interactive: true,
                  }).addTo(map).bindPopup(`
                  <div style="min-width: 200px;">
                    <b>${getDisplayName(s.id)} HAULER</b><br>
                    <hr style="margin: 5px 0;">
                    <b>Current Position:</b><br>
                    • Lat: ${s.pos[0].toFixed(6)}<br>
                    • Lng: ${s.pos[1].toFixed(6)}<br>
                    • RL: ${s.rl} m (Z:${s.altitude?.toFixed(1)} + C:${FIXED_SEA_LEVEL_HEIGHT})<br>
                  </div>
                `);

                  if (!vehicleMarkers[haulerId]) vehicleMarkers[haulerId] = [];
                  vehicleMarkers[haulerId].push(haulerMarker);
                }
              }
            }
          }

          drawPathHistory("D3");

          const haulers = {};
          if (backend.sites) {
            for (const key in backend.sites) {
              const site = backend.sites[key];
              const segments = analyzePathSegments24Hour(key);

              haulers[key] = {
                id: key,
                load: site.load || 0,
                pitch: site.pitch || 0,
                roll: site.roll || 0,
                vibration: site.vibration || 0,
                movement: site.movement || 0,
                movementLabel: getMovementLabel(site.pitch || 0),
                pitchDisplay: getPitchDisplay(site.pitch || 0),
                speed: site.speed || 0,
                currentPos: sites[key] ? sites[key].pos : null,
                pathPoints24Hour: get24HourPathHistory(key).length,
                pathDistance24Hour: calculatePathDistance24Hour(key),
                marker: null,
                altitude: site.altitude || 0,
                rl: getRL(site.altitude),
                flatSegments24Hour: segments.flatSegments,
                gradientSegments24Hour: segments.gradientSegments,
                gradient5to30: segments.gradient5to30,
                gradient30to50: segments.gradient30to50,
                gradientAbove50: segments.gradientAbove50,
                flatDistance24Hour: segments.flatDistance,
                gradientDistance24Hour: segments.gradientDistance,
                gradient5to30Distance: segments.gradient5to30Distance,
                gradient30to50Distance: segments.gradient30to50Distance,
                gradientAbove50Distance: segments.gradientAbove50Distance,
                totalSegments24Hour: segments.total,
                totalDistance24Hour: segments.totalDistance,
              };
            }
          }

          // ==================== SMART POLLING ====================
          let lastDataHash = "",
            isPolling = false,
            isUpdatingUI = false;
          const POLL_INTERVAL = 10000;
          let updateTimeout = null,
            currentSelectedHauler = "D3",
            currentChartHauler = "D3";

          function debouncedUpdateUI() {
            if (isUpdatingUI) return;
            if (updateTimeout) clearTimeout(updateTimeout);
            updateTimeout = setTimeout(() => {
              isUpdatingUI = true;
              const haulerSelector = document.getElementById("haulerSelector");
              const selectedHauler = haulerSelector
                ? haulerSelector.value
                : "D3";
              currentSelectedHauler = selectedHauler;
              drawPathHistory(selectedHauler);
              renderUI();
              console.log(
                "🔄 UI updated at:",
                new Date().toLocaleTimeString(),
                "for hauler:",
                getDisplayName(selectedHauler),
              );
              isUpdatingUI = false;
            }, 50);
          }

          function generateDataHash(data) {
            if (!data || !data.sites) return "";
            return Object.keys(data.sites)
              .sort()
              .map((key) => {
                const site = data.sites[key];
                return `${key}:${site.pos?.[0]?.toFixed(6)}:${site.pos?.[1]?.toFixed(6)}:${site.load}:${site.speed}:${site.vibration}:${site.pitch}:${site.roll}:${site.movement}:${site.altitude}`;
              })
              .join("|");
          }

          function renderSegmentChart(deviceId) {
            const canvas = document.getElementById("segmentChart");
            const segmentHaulerName =
              document.getElementById("segmentHaulerName");
            const segmentAnalysisChart = document.getElementById(
              "segmentAnalysisChart",
            );

            if (!canvas) return;

            if (segmentHaulerName)
              segmentHaulerName.textContent = getDisplayName(deviceId);

            const ctx = canvas.getContext("2d");
            if (window.segmentChartInstance)
              window.segmentChartInstance.destroy();

            const device = haulers[deviceId];
            if (!device) {
              if (segmentAnalysisChart)
                segmentAnalysisChart.style.display = "none";
              return;
            }

            const flatSegments = device.flatSegments24Hour || 0;

            let gradient5to30 = device.gradient5to30 || 0;
            let gradient30to50 = device.gradient30to50 || 0;
            let gradientAbove50 = device.gradientAbove50 || 0;
            let gradient5to30Distance = device.gradient5to30Distance || 0;
            let gradient30to50Distance = device.gradient30to50Distance || 0;
            let gradientAbove50Distance = device.gradientAbove50Distance || 0;

            const flatDistance = device.flatDistance24Hour || 0;
            const totalSegments =
              flatSegments + gradient5to30 + gradient30to50 + gradientAbove50;
            const totalDistance =
              flatDistance +
              gradient5to30Distance +
              gradient30to50Distance +
              gradientAbove50Distance;

            if (totalSegments === 0 && totalDistance === 0) {
              if (segmentAnalysisChart)
                segmentAnalysisChart.style.display = "none";
              return;
            }

            if (segmentAnalysisChart)
              segmentAnalysisChart.style.display = "block";
            canvas.style.display = "block";

            const flatCountEl = document.getElementById("flatSegmentsCount");
            const gradientCountEl = document.getElementById(
              "gradientSegmentsCount",
            );
            const totalCountEl = document.getElementById("totalSegmentsCount");

            if (flatCountEl && gradientCountEl && totalCountEl) {
              const totalGradient =
                gradient5to30 + gradient30to50 + gradientAbove50;
              flatCountEl.textContent = flatSegments;
              gradientCountEl.textContent = totalGradient;
              totalCountEl.textContent = totalSegments;
            }

            const data = {
              labels: [
                "Flat (0-5°)",
                "Gradient 5-30°",
                "Gradient 30-50°",
                "Gradient >50°",
              ],
              datasets: [
                {
                  data: [
                    flatSegments,
                    gradient5to30,
                    gradient30to50,
                    gradientAbove50,
                  ],
                  backgroundColor: [
                    "rgba(76, 175, 80, 0.9)",
                    "rgba(255, 152, 0, 0.9)",
                    "rgba(255, 87, 34, 0.9)",
                    "rgba(244, 67, 54, 0.9)",
                  ],
                  borderColor: [
                    "rgba(76, 175, 80, 1)",
                    "rgba(255, 152, 0, 1)",
                    "rgba(255, 87, 34, 1)",
                    "rgba(244, 67, 54, 1)",
                  ],
                  borderWidth: 2,
                  borderRadius: 6,
                  barPercentage: 0.6,
                  categoryPercentage: 0.7,
                },
              ],
            };

            window.segmentChartInstance = new Chart(ctx, {
              type: "bar",
              data: data,
              options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                  legend: { display: false },
                  tooltip: {
                    backgroundColor: "rgba(0, 0, 0, 0.95)",
                    titleColor: "#6ff3d6",
                    bodyColor: "#fff",
                    borderColor: "#6ff3d6",
                    borderWidth: 1,
                    padding: 12,
                    cornerRadius: 4,
                    displayColors: true,
                    callbacks: {
                      label: (context) => {
                        const value = context.raw;
                        const index = context.dataIndex;
                        const distances = [
                          flatDistance,
                          gradient5to30Distance,
                          gradient30to50Distance,
                          gradientAbove50Distance,
                        ];
                        const distance = distances[index] || 0;
                        const avg =
                          value > 0 ? (distance / value).toFixed(3) : 0;
                        const percentage =
                          totalSegments > 0
                            ? ((value / totalSegments) * 100).toFixed(1)
                            : 0;
                        return [
                          `${getDisplayName(deviceId)} - ${value} segments`,
                          `Total Distance: ${distance.toFixed(3)} km`,
                          `Average: ${avg} km/segment`,
                          `Percentage: ${percentage}%`,
                        ];
                      },
                    },
                  },
                },
                scales: {
                  y: {
                    beginAtZero: true,
                    grid: {
                      color: "rgba(120, 200, 190, 0.2)",
                      drawBorder: false,
                    },
                    ticks: {
                      color: "#8fe",
                      font: { size: 10 },
                      padding: 5,
                      stepSize: 1,
                      callback: (value) =>
                        Number.isInteger(value) ? value : "",
                    },
                    title: {
                      display: true,
                      text: "Number of Segments",
                      color: "#6ff3d6",
                      font: { size: 12, weight: "bold" },
                    },
                  },
                  x: {
                    grid: { display: false, drawBorder: false },
                    ticks: {
                      color: "#8fe",
                      font: { size: 10, weight: "bold" },
                      padding: 5,
                    },
                  },
                },
                animation: { duration: 500, easing: "easeOutQuart" },
              },
            });

            canvas.style.background = "#000";
            canvas.style.borderRadius = "4px";
          }

          async function smartPoll() {
            if (isPolling) return;
            isPolling = true;

            try {
              console.log("🔍 Checking for backend updates...");
              const response = await fetch(
                `${BASE_URL}/fetchDashboardDataby?company=TMC&sector=Mining&region=Kache`,
              );
              if (!response.ok) {
                console.warn("Backend not responding");
                return;
              }

              const json = await response.json();
              if (json.status === "success" && json.devices) {
                const newData = { sites: {} };
                json.devices.forEach((device) => {
                  if (device.device_id) {
                    newData.sites[device.device_id] = {
                      id: device.device_id,
                      pos: [device.latitude, device.longitude],
                      timestamp: device.timestamp,
                      altitude: device.altitude,
                      pitch: device.pitch,
                      roll: device.roll,
                      vibration: device.vibration,
                      movement: device.movement,
                      load: device.load || 0,
                      speed: device.speed || 0,
                    };
                  }
                });

                const newHash = generateDataHash(newData);
                if (newHash !== lastDataHash) {
                  console.log("✅ New data detected! Updating UI...");
                  lastDataHash = newHash;
                  await processNewData(newData);
                } else {
                  console.log("⏭️ No changes in backend data");
                }
              }
            } catch (error) {
              console.error("Polling error:", error);
            } finally {
              isPolling = false;
            }
          }

          async function processNewData(newData) {
            if (!newData || !newData.sites) return;

            const now = Date.now();
            let dataChanged = false;
            let haulersWithNewData = new Set();

            for (const haulerId in newData.sites) {
              const site = newData.sites[haulerId];
              if (site.pos && Array.isArray(site.pos)) {
                if (!pathHistory[haulerId]) pathHistory[haulerId] = [];

                const lastPoint =
                  pathHistory[haulerId][pathHistory[haulerId].length - 1];
                const shouldAddPoint =
                  !lastPoint || haversineKm(lastPoint.pos, site.pos) > 0.0005;

                if (shouldAddPoint) {
                  dataChanged = true;
                  haulersWithNewData.add(haulerId);
                  const C = 525.5;
                  const altitude = site.altitude || 0;
                  const rl = altitude + C;

                  pathHistory[haulerId].push({
                    pos: site.pos,
                    timestamp: now,
                    rl: Number(rl.toFixed(2)),
                    altitude: altitude,
                    pitch: site.pitch || 0,
                    roll: site.roll || 0,
                    vibration: site.vibration || 0,
                    movement: Number(site.movement ?? 0),
                    payload: site.load || 0,
                    speed: site.speed || 0,
                  });
                }

                if (sites[haulerId]) {
                  sites[haulerId].pos = site.pos;
                  sites[haulerId].rl = getRL(site.altitude);
                  sites[haulerId].altitude = site.altitude || 0;
                  sites[haulerId].pitch = site.pitch || 0;
                  sites[haulerId].roll = site.roll || 0;
                  sites[haulerId].vibration = site.vibration || 0;
                  sites[haulerId].movement = site.movement || 0;
                  sites[haulerId].load = site.load || 0;
                  sites[haulerId].speed = site.speed || 0;
                } else {
                  const rl = getRL(site.altitude);
                  sites[haulerId] = {
                    id: haulerId,
                    pos: site.pos,
                    rl: rl,
                    altitude: site.altitude || 0,
                    pitch: site.pitch || 0,
                    roll: site.roll || 0,
                    vibration: site.vibration || 0,
                    movement: site.movement || 0,
                    load: site.load || 0,
                    speed: site.speed || 0,
                  };
                }

                const segments = analyzePathSegments24Hour(haulerId);
                if (haulers[haulerId]) {
                  haulers[haulerId].currentPos = site.pos;
                  haulers[haulerId].pathPoints24Hour =
                    get24HourPathHistory(haulerId).length;
                  haulers[haulerId].pathDistance24Hour =
                    calculatePathDistance24Hour(haulerId);
                  haulers[haulerId].pitch = site.pitch || 0;
                  haulers[haulerId].pitchDisplay = getPitchDisplay(
                    site.pitch || 0,
                  );
                  haulers[haulerId].movement = site.movement || 0;
                  haulers[haulerId].movementLabel = getMovementLabel(
                    site.pitch || 0,
                  );
                  haulers[haulerId].vibration = site.vibration || 0;
                  haulers[haulerId].speed = site.speed || 0;
                  haulers[haulerId].altitude = site.altitude || 0;
                  haulers[haulerId].rl = getRL(site.altitude);
                  haulers[haulerId].load = site.load || 0;
                  haulers[haulerId].roll = site.roll || 0;
                  haulers[haulerId].flatSegments24Hour = segments.flatSegments;
                  haulers[haulerId].gradientSegments24Hour =
                    segments.gradientSegments;
                  haulers[haulerId].gradient5to30 = segments.gradient5to30;
                  haulers[haulerId].gradient30to50 = segments.gradient30to50;
                  haulers[haulerId].gradientAbove50 = segments.gradientAbove50;
                  haulers[haulerId].flatDistance24Hour = segments.flatDistance;
                  haulers[haulerId].gradientDistance24Hour =
                    segments.gradientDistance;
                  haulers[haulerId].gradient5to30Distance =
                    segments.gradient5to30Distance;
                  haulers[haulerId].gradient30to50Distance =
                    segments.gradient30to50Distance;
                  haulers[haulerId].gradientAbove50Distance =
                    segments.gradientAbove50Distance;
                } else {
                  haulers[haulerId] = {
                    id: haulerId,
                    load: site.load || 0,
                    pitch: site.pitch || 0,
                    roll: site.roll || 0,
                    vibration: site.vibration || 0,
                    movement: site.movement || 0,
                    movementLabel: getMovementLabel(site.pitch || 0),
                    pitchDisplay: getPitchDisplay(site.pitch || 0),
                    speed: site.speed || 0,
                    currentPos: site.pos,
                    pathPoints24Hour: get24HourPathHistory(haulerId).length,
                    pathDistance24Hour: calculatePathDistance24Hour(haulerId),
                    marker: null,
                    altitude: site.altitude || 0,
                    rl: getRL(site.altitude),
                    flatSegments24Hour: segments.flatSegments,
                    gradientSegments24Hour: segments.gradientSegments,
                    flatDistance24Hour: segments.flatDistance,
                    gradientDistance24Hour: segments.gradientDistance,
                    totalSegments24Hour: segments.total,
                    totalDistance24Hour: segments.totalDistance,
                  };
                }
              }
            }

            if (dataChanged) {
              pathHistory = cleanOldPathHistory(pathHistory);
              savePathHistory(pathHistory);
              debouncedUpdateUI();

              const haulerSelector = document.getElementById("haulerSelector");
              const selectedHauler = haulerSelector
                ? haulerSelector.value
                : "D3";

              if (haulersWithNewData.has(selectedHauler)) {
                console.log(
                  `📈 New data for currently selected hauler ${getDisplayName(selectedHauler)}, updating chart...`,
                );
                updateChartForHauler(selectedHauler);
              }

              if (selectedHauler === "all") {
                console.log(
                  "📈 New data in all view, updating all haulers chart...",
                );
                updateChartForHauler("all");
              }
            }
          }

          function updateChartForHauler(haulerId) {
            if (
              haulerId === currentChartHauler ||
              (haulerId === "all" && currentChartHauler === "all")
            ) {
              console.log(`🔄 Updating chart for ${getDisplayName(haulerId)}`);
              if (haulerId === "all") {
                if (typeof renderAllHaulersFuelChart === "function")
                  renderAllHaulersFuelChart(true);
              } else {
                if (typeof renderFuelGradientForHauler === "function")
                  renderFuelGradientForHauler(haulerId, true);
                if (typeof renderSegmentChart === "function")
                  renderSegmentChart(haulerId);
              }
            }
          }

          function renderUI() {
            const container = document.getElementById("haulerCards");
            const summaryHtml = document.getElementById("summaryHtml");
            const haulerSelector = document.getElementById("haulerSelector");

            if (!container || !summaryHtml) return;

            const selectedHauler = haulerSelector ? haulerSelector.value : "D3";
            currentSelectedHauler = selectedHauler;
            currentChartHauler = selectedHauler;

            container.innerHTML = "";
            let totalPathPoints24Hour = 0,
              totalPathDistance24Hour = 0,
              visibleHaulers = 0;
            let selectedHaulerData = null;

            if (selectedHauler === "all") {
              for (const key in haulers) {
                const H = haulers[key];
                totalPathPoints24Hour += H.pathPoints24Hour;
                totalPathDistance24Hour += H.pathDistance24Hour;
                visibleHaulers++;
              }

              const excavatorPos = sites["D7"]
                ? sites["D7"].pos
                : [12.9567, 77.73086];
              const d7Vibration = haulers["D7"]?.vibration || 0;
              const d7VibrationLabel = getVibrationLabel(d7Vibration);
              const d7State = detectExcavatorState(
                d7Vibration,
                haulers["D7"]?.movement || "STABLE",
              );
              const d7Altitude = haulers["D7"]?.altitude || 0;
              const d7RL = getRL(d7Altitude);

              let totalFlatSegments24Hour = 0,
                totalGradientSegments24Hour = 0;
              let totalFlatDistance24Hour = 0,
                totalGradientDistance24Hour = 0;

              for (const key in haulers) {
                if (key !== "D7") {
                  totalFlatSegments24Hour +=
                    haulers[key].flatSegments24Hour || 0;
                  totalGradientSegments24Hour +=
                    haulers[key].gradientSegments24Hour || 0;
                  totalFlatDistance24Hour +=
                    haulers[key].flatDistance24Hour || 0;
                  totalGradientDistance24Hour +=
                    haulers[key].gradientDistance24Hour || 0;
                }
              }

              const avgDistance24Hour =
                visibleHaulers > 0
                  ? totalPathDistance24Hour / visibleHaulers
                  : 0;

              summaryHtml.innerHTML = `
              <div style="background: rgba(0,0,0,0.1); padding: 10px; border-radius: 5px; margin-bottom: 10px;">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                  <strong style="color: #fff;">Fleet Overview (24-hour)</strong>
                  <span style="color: #8fe; font-size: 12px;">${visibleHaulers} vehicles</span>
                </div>
              </div>
              <table style="width:100%;border-collapse:collapse;font-size:13px;color:#dff;margin-top:8px">
                <tr><td style="color:#8fe;font-weight:700;width=42%">Excavator Position</td><td>${excavatorPos[0].toFixed(6)}, ${excavatorPos[1].toFixed(6)}</td></tr>
                <tr><td style="color:#8fe;font-weight:700;width=42%">Excavator RL</td><td><b>${d7RL} m</b> (Z:${d7Altitude?.toFixed(1)} + C:${FIXED_SEA_LEVEL_HEIGHT})</td></tr>
                <tr><td style="color:#8fe;font-weight:700;width=42%">Excavator Pitch</td><td>${haulers["D7"]?.pitchDisplay || "0°"}</td></tr>
                <tr><td style="color:#8fe;font-weight:700;width=42%">Excavator Vibration</td><td style="color:${d7Vibration === 1 || d7Vibration === 2 ? "#4CAF50" : d7Vibration === 3 ? "#FF9800" : d7Vibration === 4 || d7Vibration === 5 ? "#F44336" : "#9E9E9E"}">${d7VibrationLabel}</td></tr>
                <tr><td style="color:#8fe;font-weight:700;width=42%">Excavator State</td><td style="color:${d7State === "IDLE" ? "#4CAF50" : d7State === "OPERATING" ? "#FF9800" : d7State === "LOADING" ? "#F44336" : "#9E9E9E"}">${d7State}</td></tr>
                <tr><td style="color:#8fe;font-weight:700;width=42%">Total Path Points</td><td><b>${totalPathPoints24Hour}</b></td></tr>
                <tr><td style="color:#8fe;font-weight:700;width=42%">Total Distance</td><td><b>${totalPathDistance24Hour.toFixed(3)} km</b></td></tr>
                <tr><td style="color:#8fe;font-weight:700;width=42%">Flat Segments</td><td><b style="color:#4CAF50">${totalFlatSegments24Hour}</b> (${totalFlatDistance24Hour.toFixed(3)} km)</td></tr>
                <tr><td style="color:#8fe;font-weight:700;width=42%">Gradient Segments</td><td><b style="color:#FF9800">${totalGradientSegments24Hour}</b> (${totalGradientDistance24Hour.toFixed(3)} km)</td></tr>
                <tr><td style="color:#8fe;font-weight:700;width=42%">Avg Distance</td><td><b>${avgDistance24Hour.toFixed(3)} km</b></td></tr>
                <tr><td style="color:#8fe;font-weight:700;width=42%">Auto-Update Status</td><td><b style="color:#4CAF50">ACTIVE</b></td></tr>
                <tr><td style="color:#8fe;font-weight:700;width=42%">Last Update</td><td><b>${new Date().toLocaleTimeString()}</b></td></tr>
              </table>
            `;

              const selectedHaulerFuelChart = document.getElementById(
                "selectedHaulerFuelChart",
              );
              if (selectedHaulerFuelChart)
                selectedHaulerFuelChart.style.display = "none";
              currentChartHauler = "all";
              if (typeof renderAllHaulersFuelChart === "function")
                renderAllHaulersFuelChart();
            } else {
              for (const key in haulers) {
                if (key === selectedHauler) {
                  selectedHaulerData = haulers[key];
                  break;
                }
              }

              container.innerHTML = "";

              if (selectedHaulerData) {
                const H = selectedHaulerData;

                if (H.id === "D7") {
                  const vibration = H.vibration || 0;
                  const vibrationLabel = getVibrationLabel(vibration);
                  const excavatorState = detectExcavatorState(
                    vibration,
                    H.movement,
                  );

                  summaryHtml.innerHTML = `
                  <div style="background: rgba(0,0,0,0.1); padding: 10px; border-radius: 5px; margin-bottom: 10px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                      <strong style="color: #fff;">${getDisplayName("D7")} Detailed Info (24-hour)</strong>
                      <span style="color:#FF5722; font-size:12px; font-weight:bold;">EXCAVATOR</span>
                    </div>
                  </div>
                  <table style="width:100%;border-collapse:collapse;font-size:13px;color:#dff;margin-top:8px">
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Vehicle ID</td><td><b>${getDisplayName("D7")}</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Type</td><td><b>Excavator</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Position</td><td><b>${H.currentPos ? `${H.currentPos[0].toFixed(6)}, ${H.currentPos[1].toFixed(6)}` : "N/A"}</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Altitude</td><td><b>${H.altitude?.toFixed(2) || "N/A"} m</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">RL</td><td><b>${H.rl || "N/A"} m</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Gradient Angle</td><td><b>${H.pitchDisplay}</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Elevation</td><td style="color:${H.movementLabel === "UPHILL" ? "#FF9800" : H.movementLabel === "DOWNHILL" ? "#2196F3" : "#4CAF50"}"><b>${H.movementLabel}</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Vibration Level</td><td style="color:${vibration === 1 || vibration === 2 ? "#4CAF50" : vibration === 3 ? "#FF9800" : vibration === 4 || vibration === 5 ? "#F44336" : "#9E9E9E"}"><b>${vibrationLabel} (${vibration})</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Detected State</td><td style="color:${excavatorState === "IDLE" ? "#4CAF50" : excavatorState === "OPERATING" ? "#FF9800" : excavatorState === "LOADING" ? "#F44336" : "#9E9E9E"}"><b>${excavatorState}</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Roll</td><td><b>${H.roll ?? "N/A"}°</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Path Points</td><td><b>${H.pathPoints24Hour}</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Total Distance</td><td><b style="color:#6ef08a">${H.pathDistance24Hour.toFixed(3)} km</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Flat Segments</td><td><b style="color:#4CAF50">${H.flatSegments24Hour || 0}</b> (${(H.flatDistance24Hour || 0).toFixed(3)} km)</td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Gradient Segments</td><td><b style="color:#FF9800">${H.gradientSegments24Hour || 0}</b> (${(H.gradientDistance24Hour || 0).toFixed(3)} km)</td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Auto-Update</td><td><b style="color:#4CAF50">ACTIVE</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Last Update</td><td><b>${new Date().toLocaleTimeString()}</b></td></tr>
                  </table>
                `;
                } else {
                  summaryHtml.innerHTML = `
                  <div style="background: rgba(0,0,0,0.1); padding: 10px; border-radius: 5px; margin-bottom: 10px;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                      <strong style="color: #fff;">${getDisplayName(H.id)} Detailed Info (24-hour)</strong>
                      <span style="color:#2196F3; font-size:12px; font-weight:bold;">HAULER</span>
                    </div>
                  </div>
                  <table style="width:100%;border-collapse:collapse;font-size:13px;color:#dff;margin-top:8px">
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Vehicle ID</td><td><b>${getDisplayName(H.id)}</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Type</td><td><b>Hauler</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Current Position</td><td><b>${H.currentPos ? `${H.currentPos[0].toFixed(6)}, ${H.currentPos[1].toFixed(6)}` : "N/A"}</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Altitude</td><td><b>${H.altitude?.toFixed(2) || "N/A"} m</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">RL</td><td><b>${H.rl || "N/A"} m</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Gradient Angle</td><td><b>${H.pitchDisplay}</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Elevation</td><td><b style="color:${H.movementLabel === "UPHILL" ? "#FF9800" : H.movementLabel === "DOWNHILL" ? "#2196F3" : "#4CAF50"}">${H.movementLabel}</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Roll</td><td><b>${H.roll || "N/A"}°</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Path Points</td><td><b>${H.pathPoints24Hour}</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Total Distance</td><td><b style="color:#6ef08a">${H.pathDistance24Hour.toFixed(3)} km</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Flat Segments</td><td><b style="color:#4CAF50">${H.flatSegments24Hour || 0}</b> (${(H.flatDistance24Hour || 0).toFixed(3)} km)</td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Gradient Segments</td><td><b style="color:#FF9800">${H.gradientSegments24Hour || 0}</b> (${(H.gradientDistance24Hour || 0).toFixed(3)} km)</td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Total Segments</td><td><b>${H.totalSegments24Hour || 0}</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Auto-Update</td><td><b style="color:#4CAF50">ACTIVE</b></td></tr>
                    <tr><td style="color:#8fe;font-weight:700;width=42%">Last Update</td><td><b>${new Date().toLocaleTimeString()}</b></td></tr>
                  </table>
                `;
                }

                const selectedHaulerFuelChart = document.getElementById(
                  "selectedHaulerFuelChart",
                );
                if (selectedHaulerFuelChart)
                  selectedHaulerFuelChart.style.display = "block";
                currentChartHauler = selectedHauler;
                if (typeof renderFuelGradientForHauler === "function")
                  renderFuelGradientForHauler(selectedHauler);
              } else {
                summaryHtml.innerHTML = `No 24-hour data available for ${getDisplayName(selectedHauler)}`;
                const selectedHaulerFuelChart = document.getElementById(
                  "selectedHaulerFuelChart",
                );
                if (selectedHaulerFuelChart)
                  selectedHaulerFuelChart.style.display = "none";
              }
            }
          }

          function initializeDropdown() {
            const haulerSelector = document.getElementById("haulerSelector");
            if (!haulerSelector) return;

            haulerSelector.innerHTML = "";

            if (haulers["D3"]) {
              const d3Option = document.createElement("option");
              d3Option.value = "D3";
              d3Option.text = `${getDisplayName("D3")} (Hauler)`;
              d3Option.selected = true;
              haulerSelector.appendChild(d3Option);
            }

            const otherHaulerIds = Object.keys(haulers)
              .filter((id) => id !== "D3")
              .sort((a, b) => a.localeCompare(b));
            otherHaulerIds.forEach((id) => {
              const opt = document.createElement("option");
              opt.value = id;
              const type = id === "D7" ? "Excavator" : "Hauler";
              opt.text = `${getDisplayName(id)} (${type})`;
              haulerSelector.appendChild(opt);
            });

            const allOption = document.createElement("option");
            allOption.value = "all";
            allOption.text = "All Vehicles";
            haulerSelector.appendChild(allOption);

            haulerSelector.addEventListener("change", function () {
              console.log("Dropdown changed to:", getDisplayName(this.value));
              currentSelectedHauler = this.value;

              if (this.value !== "all") {
                const centerPos = getHaulerCurrentPosition(this.value);
                if (centerPos) setTimeout(() => map.setView(centerPos, 15), 10);
              }

              drawPathHistory(this.value);
              renderUI();

              if (this.value === "all") {
                currentChartHauler = "all";
                const segmentAnalysisChart = document.getElementById(
                  "segmentAnalysisChart",
                );
                if (segmentAnalysisChart)
                  segmentAnalysisChart.style.display = "none";
                const selectedHaulerFuelChart = document.getElementById(
                  "selectedHaulerFuelChart",
                );
                if (selectedHaulerFuelChart)
                  selectedHaulerFuelChart.style.display = "none";
                if (typeof renderAllHaulersFuelChart === "function")
                  renderAllHaulersFuelChart();
              } else {
                currentChartHauler = this.value;
                const segmentAnalysisChart = document.getElementById(
                  "segmentAnalysisChart",
                );
                if (segmentAnalysisChart) {
                  segmentAnalysisChart.style.display = "block";
                  if (typeof renderSegmentChart === "function")
                    renderSegmentChart(this.value);
                }
                const selectedHaulerFuelChart = document.getElementById(
                  "selectedHaulerFuelChart",
                );
                if (selectedHaulerFuelChart)
                  selectedHaulerFuelChart.style.display = "block";
                if (typeof renderFuelGradientForHauler === "function")
                  renderFuelGradientForHauler(this.value);
              }
            });
          }

          initializeDropdown();

          setTimeout(() => {
            setInterval(smartPoll, POLL_INTERVAL);
            smartPoll();
            console.log(
              `🔍 Started smart polling (checks every ${POLL_INTERVAL / 1000} seconds)`,
            );
          }, 2000);

          renderUI();

          setTimeout(() => {
            currentChartHauler = "D3";
            const segmentAnalysisChart = document.getElementById(
              "segmentAnalysisChart",
            );
            if (segmentAnalysisChart)
              segmentAnalysisChart.style.display = "block";
            if (typeof renderSegmentChart === "function")
              renderSegmentChart("D3");
            if (typeof renderFuelGradientForHauler === "function")
              renderFuelGradientForHauler("D3");
          }, 500);

          map.on("click", (e) => console.log("Map clicked at:", e.latlng));
          mapContainer.style.touchAction = "manipulation";
          mapContainer.style.cursor = "grab";

          setTimeout(() => {
            if (map.tap) map.tap.enable();
            if (map.touchZoom) map.touchZoom.enable();
            if (map.dragging) map.dragging.enable();
            console.log("✅ Map gestures fully enabled");
          }, 1000);

          document.getElementById("Fuel").style.visibility = "visible";
          hideLoading();
        }, 10);
      }
    </script>
  </body>
</html>
